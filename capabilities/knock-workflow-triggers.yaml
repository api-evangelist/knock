naftiko: 1.0.0-alpha2
info:
  label: Knock API — Workflow Triggers
  description: 'Knock API — Workflow Triggers. 2 operations. Lead operation: Trigger workflow. Self-contained Naftiko capability
    covering one Knock business surface.'
  tags:
  - Knock
  - Workflow Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KNOCK_API_KEY: KNOCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: knock-workflow-triggers
    baseUri: https://api.knock.app
    description: Knock API — Workflow Triggers business capability. Self-contained, no shared references.
    resources:
    - name: v1-notify
      path: /v1/notify
      operations:
      - name: triggerworkflow
        method: POST
        description: Trigger workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-notify-cancel
      path: /v1/notify/cancel
      operations:
      - name: cancelworkflow2
        method: POST
        description: Cancel workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.KNOCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: knock-workflow-triggers-rest
    port: 8080
    description: REST adapter for Knock API — Workflow Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/notify
      name: v1-notify
      description: REST surface for v1-notify.
      operations:
      - method: POST
        name: triggerworkflow
        description: Trigger workflow
        call: knock-workflow-triggers.triggerworkflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/notify/cancel
      name: v1-notify-cancel
      description: REST surface for v1-notify-cancel.
      operations:
      - method: POST
        name: cancelworkflow2
        description: Cancel workflow
        call: knock-workflow-triggers.cancelworkflow2
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: knock-workflow-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Knock API — Workflow Triggers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: trigger-workflow
      description: Trigger workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: knock-workflow-triggers.triggerworkflow
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-workflow
      description: Cancel workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: knock-workflow-triggers.cancelworkflow2
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
