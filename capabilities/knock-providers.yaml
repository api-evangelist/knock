naftiko: 1.0.0-alpha2
info:
  label: Knock API — Providers
  description: 'Knock API — Providers. 7 operations. Lead operation: Check auth. Self-contained Naftiko capability covering
    one Knock business surface.'
  tags:
  - Knock
  - Providers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KNOCK_API_KEY: KNOCK_API_KEY
capability:
