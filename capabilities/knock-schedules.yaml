      - name: listuserschedules
        method: GET
        description: List user schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: The user ID to list schedules for.
