        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow
          in: query
          type: string
          description: Filter by workflow key.
          required: true
        - name: recipients[]
          in: query
          type: array
          description: Filter by recipient references.
        - name: tenant
          in: query
          type: string
          description: Filter by tenant ID.
        - name: after
          in: query
          type: string
          description: The cursor to fetch entries after.
        - name: before
          in: query
          type: string
          description: The cursor to fetch entries before.
        - name: page_size
          in: query
